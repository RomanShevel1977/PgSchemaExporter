name: Benchmarks

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**/*.cs'
      - 'tests/PgSchemaExporter.Benchmarks/**'
  pull_request:
    paths:
      - 'src/**/*.cs'
      - 'tests/PgSchemaExporter.Benchmarks/**'
  workflow_dispatch:
    inputs:
      filter:
        description: 'BenchmarkDotNet filter expression (default: *)'
        required: false
        default: '*'

jobs:
  benchmark:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore tests/PgSchemaExporter.Benchmarks/PgSchemaExporter.Benchmarks.csproj

      - name: Run benchmarks
        run: |
          dotnet run -c Release --project tests/PgSchemaExporter.Benchmarks/PgSchemaExporter.Benchmarks.csproj -- --filter '${{ github.event.inputs.filter || '*' }}'

      - name: Checkout baseline
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: baseline

      - name: Run baseline benchmarks
        if: github.event_name == 'pull_request'
        run: |
          dotnet run -c Release --project baseline/tests/PgSchemaExporter.Benchmarks/PgSchemaExporter.Benchmarks.csproj -- --filter '${{ github.event.inputs.filter || '*' }}'

      - name: Compare benchmark results
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          ./scripts/Compare-Benchmarks.ps1 `
            -BaselineDir "baseline/BenchmarkDotNet.Artifacts/results" `
            -CurrentDir "BenchmarkDotNet.Artifacts/results" `
            -OutputPath "benchmark-comparison.md" `
            -MaxMeanRegression 1.10 `
            -MaxAllocatedRegression 1.20

      - name: Publish benchmark comparison summary
        if: github.event_name == 'pull_request' && always()
        shell: pwsh
        run: |
          if (Test-Path benchmark-comparison.md) {
            Get-Content benchmark-comparison.md -Raw | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            BenchmarkDotNet.Artifacts/results/*.md
            BenchmarkDotNet.Artifacts/results/*.csv
            BenchmarkDotNet.Artifacts/results/*.html
            benchmark-comparison.md
