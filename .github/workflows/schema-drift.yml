name: PostgreSQL Schema Drift

# Self-test CI for the `drift` and `fingerprint` commands.
# Seeds a test Postgres database, exports it, then verifies that:
#   1. The exported schema directory matches its own fingerprint.
#   2. `drift --schema ./db-schema` against the same database reports no drift.
# The `drift` command exits with code 2 when drift is found, so a real mismatch
# will still fail the job automatically.

on:
  schedule:
    - cron: '0 6 * * *'   # daily self-test
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/schema-drift.yml'
      - 'samples/sample-schema.sql'
      - 'src/**'

jobs:
  drift:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Seed test database
        env:
          PGPASSWORD: postgres
        run: |
          until pg_isready -h localhost -U postgres -q; do sleep 1; done
          psql -h localhost -U postgres -d testdb -v ON_ERROR_STOP=1 -f samples/sample-schema.sql

      - name: Build tool
        run: dotnet build src/PgSchemaExporter.Cli/PgSchemaExporter.Cli.csproj -c Release

      - name: Export schema from test database
        run: |
          dotnet run -c Release --project src/PgSchemaExporter.Cli/PgSchemaExporter.Cli.csproj \
            export \
            --connection "Host=localhost;Database=testdb;Username=postgres;Password=postgres" \
            --schemas app \
            --output ./db-schema

      - name: Verify schema fingerprint
        run: |
          dotnet run -c Release --project src/PgSchemaExporter.Cli/PgSchemaExporter.Cli.csproj \
            fingerprint \
            --schema ./db-schema \
            --output ./db-schema/schema.fingerprint.json
          dotnet run -c Release --project src/PgSchemaExporter.Cli/PgSchemaExporter.Cli.csproj \
            fingerprint \
            --schema ./db-schema \
            --verify ./db-schema/schema.fingerprint.json

      - name: Detect drift against live database
        id: drift
        run: |
          dotnet run -c Release --project src/PgSchemaExporter.Cli/PgSchemaExporter.Cli.csproj \
            drift \
            --schema ./db-schema \
            --connection "Host=localhost;Database=testdb;Username=postgres;Password=postgres" \
            --schemas app \
            --format json \
            --output drift-report.json

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schema-drift-report
          path: drift-report.json

      # The drift command exits with code 2 when drift is detected, which fails
      # the "Detect drift" step above automatically. This step surfaces a clear
      # error annotation for reviewers.
      - name: Report drift
        if: failure() && steps.drift.outcome == 'failure'
        run: |
          echo "::error::Schema drift detected between db-schema/ and the live database. Review the drift-report artifact."
